apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep
  namespace: logger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-log
      containers:
        - name: log-output-logger
          image: eetujukka/log-output-logger:1.2
        - name: log-output-server
          image: eetujukka/log-output-server:1.6
          env:
            - name: PORT
              value: "3002"