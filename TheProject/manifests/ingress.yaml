apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-with-kubernetes-project-ingress
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: devops-with-kubernetes-backend-svc
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devops-with-kubernetes-frontend-svc
            port:
              number: 8080
