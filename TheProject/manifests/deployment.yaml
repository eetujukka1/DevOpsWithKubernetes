apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-with-kubernetes-project-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-with-kubernetes-project
  template:
    metadata:
      labels:
        app: devops-with-kubernetes-project
    spec:
      volumes:
        - name: image-volume
          persistentVolumeClaim:
            claimName: the-project-claim
      containers:
        - name: devops-with-kubernetes-project
          image: eetujukka/devops-with-kubernetes-project:1.9
          env:
            - name: PORT
              value: "3001"
          volumeMounts:
            - name: image-volume
              mountPath: /usr/src/app/files