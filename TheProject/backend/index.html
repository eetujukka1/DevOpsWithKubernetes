<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo app</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 2rem;
      }

      img {
        display: block;
        margin: 1rem 0 2rem;
      }

      .todo-form {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .todo-form input {
        flex: 1;
        max-width: 28rem;
        padding: 0.5rem;
      }

      .todo-form button {
        padding: 0.5rem 1rem;
      }

      .hint {
        color: #555;
        margin-bottom: 1.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Todo app</h1>
    <img src="/image.jpg" alt="Random image generated by the server" />

    <form class="todo-form">
      <input
        type="text"
        name="todo"
        placeholder="Write a todo"
        maxlength="140"
        aria-label="Todo"
      />
      <button type="button">Send</button>
    </form>

    <p class="hint">Todos are limited to 140 characters.</p>

    <h2>Existing todos</h2>
    <ul>
      <li>Buy groceries</li>
      <li>Finish Kubernetes exercises</li>
      <li>Book dentist appointment</li>
    </ul>
  </body>
</html>
